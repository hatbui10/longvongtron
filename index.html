<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Mắt Xích Studio v12.0 - Pro UI & Fast Rotate</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --bg: #0d0d0f; --panel: #1a1a1e; --border: #2d2d32;
            --text: #e0e0e0; --accent: #007aff; --danger: #ff453a; --success: #32d74b;
            --input-bg: #000000;
        }
        body { display: flex; flex-direction: column; height: 100vh; margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', 'Segoe UI', sans-serif; overflow: hidden; }

        /* Toolbar UI hiện đại */
        .toolbar {
    display: flex; 
    align-items: center; 
    justify-content: space-between; /* Giãn cách đều các nhóm ra tận 2 mép */
    gap: 30px; /* Tăng khoảng cách giữa các cụm nút */
    background: var(--panel); 
    padding: 15px 30px; /* Tăng độ dày bên trong khung */
    border-bottom: 1px solid var(--border); 
    z-index: 1000;
    min-height: 100px; /* Làm khung cao hơn một chút cho dễ nhìn */
}

/* Nới rộng chiều rộng của từng nhóm chức năng */
.group { 
    display: flex; 
    flex-direction: column; 
    gap: 10px; 
    border-right: 1px solid var(--border); 
    padding-right: 25px; /* Tăng vạch ngăn cách rộng ra */
    flex: 1; /* Cho phép các nhóm tự mở rộng để lấp đầy thanh ngang */
    max-width: 400px; /* Giới hạn độ rộng tối đa để không bị quá loãng */
}



        .group:last-child { border: none; }
        .group-label { font-size: 9px; font-weight: 800; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }

        .input-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #999; }
        
        select, input[type="number"] { background: var(--input-bg); border: 1px solid var(--border); color: #fff; padding: 5px; border-radius: 4px; outline: none; }
        select:focus, input[type="number"]:focus { border-color: var(--accent); }
        select { cursor: pointer; height: 30px; width: 100%; font-size: 11px; }
        input[type="number"] { width: 42px; text-align: center; }
        
        input[type="range"] { flex: 1; height: 4px; background: #333; border-radius: 2px; accent-color: var(--accent); cursor: pointer; }
        input[type="color"] { border: none; width: 24px; height: 24px; cursor: pointer; background: none; padding: 0; border-radius: 2px; }

        .btn { padding: 7px 12px; border-radius: 4px; border: none; color: white; cursor: pointer; font-weight: 700; font-size: 10px; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn:active { transform: translateY(1px); filter: brightness(0.8); }
        .btn-blue { background: var(--accent); }
        .btn-red { background: var(--danger); }
        .btn-green { background: var(--success); }
        .btn-gray { background: #3a3a3c; color: #fff; padding: 5px 8px; min-width: 28px; font-size: 14px; }
        .btn-3d { background: linear-gradient(135deg, #5e5ce6, #bf5af2); }
        .btn-flat { background: #48484a; }

        .preview-container { flex: 1; padding: 15px; display: flex; background: #111; position: relative; }
        #workspace { width: 100%; height: 100%; border-radius: 8px; position: relative; overflow: hidden; background: #000; border: 1px solid var(--border); }
        #mainSvg { width: 100%; height: 100%; }
        
        .effect-3d { filter: url(#dynamicBevel) !important; }
        .selected { outline: 1px dashed rgba(255,255,255,0.5); outline-offset: 4px; }
        #targetFrame { pointer-events: none; display: none; } 
    </style>
</head>
<body>

<div class="toolbar">
    <div class="group">
        <div class="group-label">1. Vật Thể Chủ</div>
        <select id="shapeType" onchange="toggleInputs()">
            <option value="circle_ring">○ Hình Tròn (Vòng nhẫn)</option>
            <option value="circle_solid" selected>● Hình Cầu (Khối đặc)</option>
            <option value="ellipse">⬭ Hình Elip</option>
            <option value="rect">■ Hình Vuông / CN</option>
            <option value="cylinder">▮ Hình Trụ</option>
            <option value="cone">▲ Hình Nón</option>
        </select>
        <button class="btn btn-blue" onclick="addNewShape()">+ Tạo Vật Chủ</button>
        <div class="input-row">
            <span>Màu Nền:</span>
            <input type="color" id="bgPicker" value="#000000" oninput="updateBg()">
        </div>
    </div>

    <div class="group">
        <div class="group-label">2. Kích Thước & Viền</div>
        <div class="input-row">
            <span id="labelW">W:</span><input type="number" id="dimW" value="100" oninput="updateSelectedProps()">
            <span id="labelH">H:</span><input type="number" id="dimH" value="100" oninput="updateSelectedProps()">
            <span>Viền:</span><input type="number" id="currStroke" value="15" oninput="updateSelectedProps()">
        </div>
        <div class="input-row" style="margin-top:2px;">
            <span>Viền:</span>
            <input type="range" id="strokeSlider" min="1" max="100" value="15" oninput="syncStroke(this.value)">
        </div>
        <div class="input-row">
            <span>Cắt:</span>
            <input type="range" id="cLen" min="10" max="355" value="180" oninput="drawTarget()">
            <button class="btn btn-red" onclick="tryCut()" style="padding: 4px 10px;">CẮT</button>
        </div>
    </div>

    <div class="group">
        <div class="group-label">3. 3D & Xoay</div>
        <div class="input-row">
            <button class="btn btn-gray" onclick="rotatePiece(-15)">↺</button>
            <input type="number" id="currRot" value="0" oninput="updateSelectedProps()">
            <button class="btn btn-gray" onclick="rotatePiece(15)">↻</button>
            <span style="margin-left: 10px">Sáng:</span>
            <input type="range" id="lightAngle" min="0" max="360" value="135" oninput="updateLighting()">
        </div>
        <div style="display:flex; gap:6px; margin-top:4px;">
            <input type="color" id="pColor" value="#007aff">
            <button class="btn btn-3d" onclick="apply3D()" style="flex:1">TÔ 3D</button>
            <button class="btn btn-flat" onclick="applyFlat()">PHẲNG</button>
        </div>
    </div>

    <div class="group" style="flex-grow: 1; border: none;">
        <div class="group-label">4. Quản Lý & Xuất</div>
        <div style="display:flex; gap:8px;">
            <button class="btn btn-red" onclick="deleteObj()" style="flex:1">XÓA</button>
            <button class="btn btn-blue" onclick="smartSnap()" style="flex:1">HÚT VỀ GỐC</button>
        </div>
        <button class="btn btn-green" onclick="exportImage()" style="width: 100%; margin-top: 8px; padding: 8px;">📸 XUẤT FILE ẢNH PNG</button>
    </div>
</div>

<div class="preview-container">
    <div id="workspace" onclick="deselect(event)">
        <svg id="mainSvg" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="dynamicBevel" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
                    <feSpecularLighting in="blur" surfaceScale="5" specularConstant="0.8" specularExponent="20" lighting-color="#ffffff" result="specOut">
                        <fePointLight id="lightSource" x="-5000" y="-5000" z="10000"/>
                    </feSpecularLighting>
                    <feComposite in="specOut" in2="SourceGraphic" operator="in"/>
                    <feComposite in="SourceGraphic" in2="specOut" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
                </filter>
            </defs>
            <g id="baseLayer"></g>
            <path id="targetFrame" fill="none" stroke="#ffcc00" stroke-width="2" stroke-dasharray="8,4" />
            <g id="piecesLayer"></g>
        </svg>
    </div>
</div>

<script>
    /* TOÀN BỘ LOGIC JS GIỮ NGUYÊN NHƯ YÊU CẦU */
    let selectedObj = null;
    let centerX, centerY;

    function updateLayout() {
        const rect = document.getElementById('workspace').getBoundingClientRect();
        centerX = rect.width / 2; centerY = rect.height / 2;
        drawTarget();
    }
    window.addEventListener('resize', updateLayout);
    setTimeout(updateLayout, 100);

    function toggleInputs() {
        const type = document.getElementById('shapeType').value;
        const isCircle = type.includes('circle');
        document.getElementById('dimH').style.opacity = isCircle ? "0.3" : "1";
        document.getElementById('dimH').disabled = isCircle;
        document.getElementById('labelW').innerText = isCircle ? "R:" : "W:";
    }

    function syncStroke(val) {
        document.getElementById('strokeSlider').value = val;
        document.getElementById('currStroke').value = val;
        updateSelectedProps();
    }

    function updateBg() { document.getElementById('workspace').style.backgroundColor = document.getElementById('bgPicker').value; }

    function addNewShape() {
        const type = document.getElementById('shapeType').value;
        const w = parseFloat(document.getElementById('dimW').value);
        const h = parseFloat(document.getElementById('dimH').value);
        const sw = document.getElementById('currStroke').value;
        let el;

        if (type.startsWith('circle')) {
            el = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            el.setAttribute('cx', centerX); el.setAttribute('cy', centerY); el.setAttribute('r', w);
        } else if (type === 'ellipse') {
            el = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
            el.setAttribute('cx', centerX); el.setAttribute('cy', centerY); el.setAttribute('rx', w); el.setAttribute('ry', h);
        } else if (type === 'rect' || type === 'cylinder') {
            el = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            el.setAttribute('x', centerX - w/2); el.setAttribute('y', centerY - h/2);
            el.setAttribute('width', w); el.setAttribute('height', h);
            if(type === 'cylinder') el.setAttribute('rx', w/2);
        } else if (type === 'cone') {
            el = document.createElementNS("http://www.w3.org/2000/svg", "path");
            el.setAttribute('d', `M ${centerX} ${centerY - h/2} L ${centerX - w/2} ${centerY + h/2} L ${centerX + w/2} ${centerY + h/2} Z`);
        }

        if(type === 'circle_solid') { el.setAttribute('fill', '#444'); el.setAttribute('stroke-width', 0); }
        else { el.setAttribute('fill', 'none'); el.setAttribute('stroke', '#555'); el.setAttribute('stroke-width', sw); }

        el.setAttribute('data-type', type);
        el.id = "shape_" + Date.now();
        setupElement(el); document.getElementById('baseLayer').appendChild(el); select(el);
    }

    function setupElement(el) {
        interact(el).draggable({
            listeners: { move(e) {
                const t = e.target;
                const x = (parseFloat(t.getAttribute('data-x')) || 0) + e.dx;
                const y = (parseFloat(t.getAttribute('data-y')) || 0) + e.dy;
                t.setAttribute('data-x', x); t.setAttribute('data-y', y);
                updateTransform(t);
            }}
        }).on('tap', (e) => { e.stopPropagation(); select(el); });
    }

    function updateTransform(el) {
        const x = el.getAttribute('data-x') || 0, y = el.getAttribute('data-y') || 0, r = el.getAttribute('data-rot') || 0;
        el.style.transform = `translate(${x}px, ${y}px) rotate(${r}deg)`;
        el.style.transformOrigin = `${centerX}px ${centerY}px`;
    }

    function select(el) {
        if (selectedObj) selectedObj.classList.remove('selected');
        selectedObj = el; el.classList.add('selected');
        document.getElementById('currStroke').value = el.getAttribute('stroke-width') || 0;
        document.getElementById('strokeSlider').value = el.getAttribute('stroke-width') || 0;
        document.getElementById('currRot').value = el.getAttribute('data-rot') || 0;
        document.getElementById('targetFrame').style.display = 'block';
        drawTarget();
    }

    function deselect(e) { if (e.target.id === "workspace") { if (selectedObj) selectedObj.classList.remove('selected'); selectedObj = null; document.getElementById('targetFrame').style.display='none'; } }

    function updateSelectedProps() {
        if (!selectedObj) return;
        const w = parseFloat(document.getElementById('dimW').value);
        const h = parseFloat(document.getElementById('dimH').value);
        const sw = document.getElementById('currStroke').value;
        const rot = document.getElementById('currRot').value;
        const type = selectedObj.getAttribute('data-type');
        selectedObj.setAttribute('data-rot', rot);
        if (selectedObj.getAttribute('fill') === 'none') selectedObj.setAttribute('stroke-width', sw);
        if (type.startsWith('circle')) selectedObj.setAttribute('r', w);
        else if (type === 'ellipse') { selectedObj.setAttribute('rx', w); selectedObj.setAttribute('ry', h); }
        else if (selectedObj.tagName === 'rect') { selectedObj.setAttribute('width', w); selectedObj.setAttribute('height', h); selectedObj.setAttribute('x', centerX - w/2); selectedObj.setAttribute('y', centerY - h/2); }
        else if (type === 'cone') { selectedObj.setAttribute('d', `M ${centerX} ${centerY - h/2} L ${centerX - w/2} ${centerY + h/2} L ${centerX + w/2} ${centerY + h/2} Z`); }
        updateTransform(selectedObj); drawTarget();
    }

    function rotatePiece(deg) {
        if (!selectedObj) return;
        let r = (parseFloat(selectedObj.getAttribute('data-rot')) || 0) + deg;
        selectedObj.setAttribute('data-rot', r);
        document.getElementById('currRot').value = r;
        updateTransform(selectedObj);
    }

    function drawTarget() {
        if(!selectedObj) return;
        const w = parseFloat(document.getElementById('dimW').value);
        const lD = parseFloat(document.getElementById('cLen').value);
        const tf = document.getElementById('targetFrame');
        const x2 = centerX + w * Math.cos(lD * Math.PI / 180), y2 = centerY + w * Math.sin(lD * Math.PI / 180);
        tf.setAttribute('d', `M ${centerX + w} ${centerY} A ${w} ${w} 0 ${lD > 180 ? 1 : 0} 1 ${x2} ${y2}`);
    }

    function tryCut() {
        if (!selectedObj) return;
        const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
        p.setAttribute('d', document.getElementById('targetFrame').getAttribute('d'));
        p.setAttribute('fill', 'none'); p.setAttribute('stroke', '#555'); 
        p.setAttribute('stroke-width', document.getElementById('currStroke').value);
        p.id = "piece_" + Date.now();
        p.setAttribute('data-type', 'path');
        setupElement(p); document.getElementById('piecesLayer').appendChild(p); select(p);
    }

    function apply3D() { if (selectedObj) { selectedObj.setAttribute('stroke', document.getElementById('pColor').value); selectedObj.classList.add('effect-3d'); } }
    function applyFlat() { if (selectedObj) selectedObj.classList.remove('effect-3d'); }
    function deleteObj() { if(selectedObj) { selectedObj.remove(); selectedObj = null; document.getElementById('targetFrame').style.display='none'; } }
    function smartSnap() { if(selectedObj) { selectedObj.setAttribute('data-x', 0); selectedObj.setAttribute('data-y', 0); updateTransform(selectedObj); } }
    
    function updateLighting() {
        const angle = document.getElementById('lightAngle').value;
        const rad = angle * Math.PI / 180;
        document.getElementById('lightSource').setAttribute('x', Math.cos(rad) * -5000);
        document.getElementById('lightSource').setAttribute('y', Math.sin(rad) * -5000);
    }

    function exportImage() {
        html2canvas(document.getElementById('workspace')).then(canvas => {
            const link = document.createElement('a');
            link.download = 'mat-xich-studio-export.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
