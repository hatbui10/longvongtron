<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Mắt Xích Studio Pro - Redesign</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root { 
            --bg: #09090b; --panel: #18181b; --border: #27272a;
            --text: #fafafa; --text-dim: #a1a1aa;
            --accent: #3b82f6; --danger: #ef4444; --success: #22c55e; --warning: #f59e0b;
        }
        
        body { 
            display: flex; flex-direction: column; height: 100vh; margin: 0; 
            background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; overflow: hidden; 
        }

        /* TOOLBAR HIỆN ĐẠI */
        .header {
            background: var(--panel); border-bottom: 1px solid var(--border);
            padding: 12px 20px; display: grid; grid-template-columns: 1fr 1fr 1.5fr 1fr; gap: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); z-index: 10;
        }

        .group { display: flex; flex-direction: column; gap: 8px; }
        .group-header { 
            font-size: 10px; font-weight: 700; color: var(--text-dim); 
            text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px;
            display: flex; align-items: center; gap: 5px;
        }
        .group-header::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        .controls-row { display: flex; gap: 8px; align-items: center; }

        /* INPUTS & BUTTONS */
        input[type="number"] {
            background: var(--bg); border: 1px solid var(--border); color: white;
            padding: 6px; border-radius: 4px; width: 50px; font-size: 12px; outline: none;
        }
        input[type="range"] { flex: 1; accent-color: var(--accent); cursor: pointer; }
        
        button {
            padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; border: 1px solid transparent;
            display: flex; align-items: center; justify-content: center; gap: 5px;
            color: white;
        }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        .btn-blue { background: var(--accent); }
        .btn-zinc { background: #3f3f46; border-color: #52525b; }
        .btn-green { background: var(--success); }
        .btn-orange { background: var(--warning); color: #000; }
        .btn-red { background: var(--danger); }

        /* STUDIO MÀU */
        .color-studio { display: flex; gap: 10px; background: var(--bg); padding: 8px; border-radius: 8px; border: 1px solid var(--border); }
        .paste-box { 
            width: 80px; height: 50px; border: 2px dashed #3f3f46; border-radius: 4px;
            display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden;
        }
        .paste-box canvas { width: 100%; height: 100%; object-fit: cover; }
        .paste-box span { position: absolute; font-size: 8px; color: #52525b; pointer-events: none; text-align: center; }

        /* WORKSPACE TRÀN VIỀN */
        #workspace { flex: 1; position: relative; overflow: hidden; cursor: crosshair; }
        #mainSvg { width: 100%; height: 100%; }
        
        #targetFrame { pointer-events: none; stroke: var(--warning); stroke-width: 2; stroke-dasharray: 4 4; opacity: 0.5; }
        .selected { stroke-width: 20px !important; filter: drop-shadow(0 0 8px rgba(255,255,255,0.8)) !important; stroke: #fff !important; }

        #toast { 
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: white; padding: 10px 24px; 
            border-radius: 99px; font-size: 13px; font-weight: 500; display: none; z-index: 100;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <div id="toast">Thông báo</div>

    <div class="header">
        <div class="group">
            <div class="group-header">1. Khởi tạo</div>
            <button class="btn-zinc" onclick="addNewCircle()">+ TẠO VÒNG TRÒN</button>
            <div class="controls-row">
                <span style="font-size:10px; color:var(--text-dim)">Size:</span>
                <input type="number" id="gSize" value="80" onchange="updateAll()">
                <span style="font-size:10px; color:var(--text-dim)">Dày:</span>
                <input type="number" id="gStroke" value="15" onchange="updateAll()">
            </div>
        </div>

        <div class="group">
            <div class="group-header">2. Khuôn cắt</div>
            <div class="group" style="gap:2px">
                <div class="controls-row"><label style="font-size:10px">Vị trí:</label><input type="range" id="cStart" min="0" max="360" value="0" oninput="drawTarget()"></div>
                <div class="controls-row"><label style="font-size:10px">Độ dài:</label><input type="range" id="cLen" min="10" max="350" value="90" oninput="drawTarget()"></div>
            </div>
            <button class="btn-red" onclick="tryCut()">KÍCH HOẠT CẮT</button>
        </div>

        <div class="group">
            <div class="group-header">3. Màu sắc & Biến đổi</div>
            <div class="color-studio">
                <div class="paste-box">
                    <canvas id="cvLab"></canvas>
                    <span id="hintTxt">Dán ảnh<br>(Ctrl+V)</span>
                </div>
                <div style="flex:1; display:flex; flex-direction:column; justify-content: space-between;">
                    <div id="rgbVal" style="font-size:10px; font-family:monospace; color:var(--success)">RGB(---)</div>
                    <div class="controls-row">
                        <input type="color" id="pColor" value="#3b82f6" style="width:24px; height:24px; border:none; background:none;">
                        <button class="btn-green" style="flex:1; padding:4px" onclick="applyColor()">TÔ MÀU</button>
                    </div>
                </div>
            </div>
            <div class="controls-row">
                <button class="btn-zinc" style="flex:1" onclick="rotatePiece(-15)">↺</button>
                <button class="btn-zinc" style="flex:1" onclick="rotatePiece(15)">↻</button>
                <button class="btn-zinc" style="flex:1" onclick="rotatePiece(180)">ĐẢO</button>
            </div>
        </div>

        <div class="group">
            <div class="group-header">4. Nâng cao</div>
            <button class="btn-orange" onclick="copyInside()">COPY LÒNG LỒNG</button>
            <button class="btn-zinc" style="background:#7f1d1d; border:none" onclick="deleteObj()">XÓA VẬT CHỌN</button>
            <p style="font-size:8px; color:var(--text-dim); margin:0; text-align:center">Bấm vào khoảng trống để bỏ chọn</p>
        </div>
    </div>

    <div id="workspace" onclick="deselect(event)">
        <svg id="mainSvg">
            <g id="baseLayer"></g>
            <path id="targetFrame" fill="none" />
            <g id="piecesLayer"></g>
        </svg>
    </div>

    <script>
        let selectedObj = null;
        const svg = document.getElementById('mainSvg');
        
        // Cập nhật tọa độ tâm theo màn hình
        let centerX = window.innerWidth / 2;
        let centerY = (window.innerHeight - 120) / 2;

        window.addEventListener('resize', () => {
            centerX = window.innerWidth / 2;
            centerY = (window.innerHeight - 120) / 2;
            drawTarget();
        });

        // --- MÀU SẮC ---
        const cv = document.getElementById('cvLab');
        const ctx = cv.getContext('2d');
        window.addEventListener('paste', e => {
            const item = e.clipboardData.items[0];
            if (item && item.type.includes("image")) {
                const img = new Image();
                img.onload = () => { 
                    cv.width = img.width; cv.height = img.height; 
                    ctx.drawImage(img, 0, 0); 
                    document.getElementById('hintTxt').style.display='none'; 
                };
                img.src = URL.createObjectURL(item.getAsFile());
            }
        });
        cv.addEventListener('mousemove', e => {
            const r = cv.getBoundingClientRect();
            const x = (e.clientX - r.left) * (cv.width / r.width);
            const y = (e.clientY - r.top) * (cv.height / r.height);
            const p = ctx.getImageData(x, y, 1, 1).data;
            const hex = "#" + ((1 << 24) + (p[0] << 16) + (p[1] << 8) + p[2]).toString(16).slice(1);
            document.getElementById('rgbVal').innerText = `RGB(${p[0]},${p[1]},${p[2]})`;
            document.getElementById('pColor').value = hex;
        });

        // --- HÀM HỖ TRỢ ---
        function select(el) {
            if(selectedObj) selectedObj.classList.remove('selected');
            selectedObj = el;
            el.classList.add('selected');
            el.parentNode.appendChild(el); 
        }

        function deselect(e) {
            if(e.target.id === "workspace" || e.target.id === "mainSvg") {
                if(selectedObj) { selectedObj.classList.remove('selected'); selectedObj = null; }
            }
        }

        function updateTransform(el) {
            const x = el.getAttribute('data-x') || 0;
            const y = el.getAttribute('data-y') || 0;
            const r = el.getAttribute('data-rot') || 0;
            el.style.transform = `translate(${x}px, ${y}px) rotate(${r}deg)`;
        }

        function rotatePiece(deg) {
            if(!selectedObj) return;
            let currentRot = parseFloat(selectedObj.getAttribute('data-rot')) || 0;
            currentRot += deg;
            selectedObj.setAttribute('data-rot', currentRot);
            updateTransform(selectedObj);
        }

        // --- DI CHUYỂN OFFSET ---
        function bindDrag(el) {
            interact(el).draggable({
                listeners: {
                    start(event) {
                        const t = event.target;
                        const mx = event.clientX, my = event.clientY;
                        const cx = parseFloat(t.getAttribute('data-x')) || 0;
                        const cy = parseFloat(t.getAttribute('data-y')) || 0;
                        t.setAttribute('data-offset-x', mx - cx);
                        t.setAttribute('data-offset-y', my - cy);
                    },
                    move(event) {
                        const t = event.target;
                        const ox = parseFloat(t.getAttribute('data-offset-x')) || 0;
                        const oy = parseFloat(t.getAttribute('data-offset-y')) || 0;
                        t.setAttribute('data-x', event.clientX - ox);
                        t.setAttribute('data-y', event.clientY - oy);
                        updateTransform(t);
                    }
                }
            });
        }

        // --- CHỨC NĂNG CHÍNH ---
        function addNewCircle() {
            const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            c.setAttribute('cx', centerX); c.setAttribute('cy', centerY);
            c.setAttribute('r', document.getElementById('gSize').value);
            c.setAttribute('stroke', '#3f3f46'); 
            c.setAttribute('stroke-width', document.getElementById('gStroke').value);
            c.setAttribute('fill', 'none');
            c.setAttribute('class', 'draggable');
            interact(c).on('tap', (e) => { e.stopPropagation(); select(c); });
            document.getElementById('baseLayer').appendChild(c);
            bindDrag(c);
            showToast("Đã tạo khung vòng tròn!");
        }

        function tryCut() {
            const rings = document.querySelectorAll('#baseLayer circle');
            rings.forEach(r => {
                const x = parseFloat(r.getAttribute('cx')) + (parseFloat(r.getAttribute('data-x')) || 0);
                const y = parseFloat(r.getAttribute('cy')) + (parseFloat(r.getAttribute('data-y')) || 0);
                // Kiểm tra xem vòng tròn có đang nằm gần tâm khuôn cắt không
                if (Math.abs(x - centerX) < 50 && Math.abs(y - centerY) < 50) createPiece(r);
            });
        }

        function createPiece(source) {
            const s = document.getElementById('cStart').value, l = document.getElementById('cLen').value, r = source.getAttribute('r');
            const sR = s * Math.PI / 180, eR = (parseFloat(s) + parseFloat(l)) * Math.PI / 180;
            const x1 = centerX + r * Math.cos(sR), y1 = centerY + r * Math.sin(sR);
            const x2 = centerX + r * Math.cos(eR), y2 = centerY + r * Math.sin(eR);

            const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
            p.setAttribute('d', `M ${x1} ${y1} A ${r} ${r} 0 ${l > 180 ? 1 : 0} 1 ${x2} ${y2}`);
            p.setAttribute('stroke', source.getAttribute('stroke'));
            p.setAttribute('stroke-width', source.getAttribute('stroke-width'));
            p.setAttribute('fill', 'none'); p.setAttribute('stroke-linecap', 'round');
            p.style.transformOrigin = `${centerX}px ${centerY}px`;

            interact(p).on('tap', (e) => { e.stopPropagation(); select(p); });
            document.getElementById('piecesLayer').appendChild(p);
            bindDrag(p);
            showToast("Đã cắt khúc!");
        }

        function copyInside() {
            if(!selectedObj || selectedObj.tagName !== 'path') { showToast("Vui lòng chọn 1 khúc cắt!"); return; }
            const clone = selectedObj.cloneNode(true);
            let rot = (parseFloat(selectedObj.getAttribute('data-rot')) || 0) + 180;
            clone.setAttribute('data-rot', rot);
            clone.classList.remove('selected');
            interact(clone).on('tap', (e) => { e.stopPropagation(); select(clone); });
            document.getElementById('piecesLayer').appendChild(clone);
            bindDrag(clone);
            updateTransform(clone);
            select(clone);
            showToast("Đã nhân bản & đảo góc!");
        }

        function applyColor() {
            if(!selectedObj) return;
            selectedObj.setAttribute('stroke', document.getElementById('pColor').value);
        }

        function drawTarget() {
            const r = document.getElementById('gSize').value, s = document.getElementById('cStart').value, l = document.getElementById('cLen').value;
            const sR = s * Math.PI / 180, eR = (parseFloat(s) + parseFloat(l)) * Math.PI / 180;
            const x1 = centerX + r * Math.cos(sR), y1 = centerY + r * Math.sin(sR), x2 = centerX + r * Math.cos(eR), y2 = centerY + r * Math.sin(eR);
            document.getElementById('targetFrame').setAttribute('d', `M ${x1} ${y1} A ${r} ${r} 0 ${l > 180 ? 1 : 0} 1 ${x2} ${y2}`);
        }

        function deleteObj() { if(selectedObj) { selectedObj.remove(); selectedObj = null; showToast("Đã xóa"); } }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(()=>t.style.display='none', 2000); }
        function updateAll() { drawTarget(); }
        drawTarget();
    </script>
</body>
</html>
